<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- Google tag (gtag.js) -->

    <script>

      gtag('config', 'G-KLVF2ZG1WX');

    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co https://www.google-analytics.com https://www.googletagmanager.com https://api.qrserver.com; connect-src 'self' https://*.supabase.co https://cdn.jsdelivr.net https://www.google-analytics.com https://region1.google-analytics.com; media-src 'self' blob: https://*.supabase.co; frame-src 'none'; object-src 'none';">
    <title>Prokaiwa | Cancel Subscription</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="description" content="We'd hate to see you go. Let us know how we can improve.">
    <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="assets/css/cancellation.css">
</head>
<body>
    <div id="nav-placeholder"></div>

    <main>
        <!-- Processing Overlay -->
        <div class="processing-overlay" id="processing-overlay">
            <div class="processing-content">
                <i class="fas fa-spinner"></i>
                <h3 id="processing-text" data-i18n="processing">処理中...</h3>
            </div>
        </div>

        <div class="cancellation-container">
            <!-- Header -->
            <div class="cancellation-header">
                <h1 data-i18n="pageTitle">サブスクリプションのキャンセル</h1>
                <p data-i18n="pageSubtitle">お別れする前に、改善のお手伝いをさせてください</p>
            </div>

            <!-- Progress Steps -->
            <div class="cancellation-steps">
                <div class="step active" id="step1">
                    <div class="step-circle">1</div>
                    <div class="step-label" data-i18n="stepReason">理由</div>
                </div>
                <div class="step" id="step2">
                    <div class="step-circle">2</div>
                    <div class="step-label" data-i18n="stepDetails">詳細</div>
                </div>
                <div class="step" id="step3">
                    <div class="step-circle">3</div>
                    <div class="step-label" data-i18n="stepConfirm">確認</div>
                </div>
            </div>

            <!-- Cancellation Card -->
            <div class="cancellation-card">
                <!-- STEP 1: Reason Selection -->
                <div class="step-section active" id="section-reason">
                    <h2 data-i18n="step1Title">キャンセルされる理由を教えてください</h2>
                    <p style="color: var(--color-text-light); margin-bottom: 1rem;" data-i18n="step1Subtitle">あなたのフィードバックは、サービスの改善に役立ちます</p>

                    <div class="reason-grid" id="reason-grid"></div>

                    <div class="navigation-buttons">
                        <button class="btn-primary-action" onclick="proceedToDetails()" id="btn-continue-step1" disabled>
                            <span data-i18n="btnNext">次へ</span> <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>

                <!-- STEP 2: Detailed Questions -->
                <div class="step-section" id="section-details">
                    <h2 id="details-title" data-i18n="step2Title">詳しく教えてください</h2>
                    <div class="question-form" id="question-form"></div>

                    <div class="navigation-buttons">
                        <button class="btn-secondary-action" onclick="goBack('details')">
                            <i class="fas fa-arrow-left"></i> <span data-i18n="btnBack">戻る</span>
                        </button>
                        <button class="btn-primary-action" onclick="proceedToOfferOrConfirm()" id="btn-continue-step2">
                            <span data-i18n="btnNext">次へ</span> <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>

                <!-- HIDDEN STEP: Retention Offer -->
                <div class="step-section" id="section-offer"></div>

                <!-- STEP 3: Final Confirmation -->
                <div class="step-section" id="section-confirm">
                    <h2 data-i18n="step3Title">本当にキャンセルしますか？</h2>
                    
                    <div class="confirmation-warning">
                        <h4><i class="fas fa-exclamation-triangle"></i> <span data-i18n="step3Warning">キャンセルすると失うもの：</span></h4>
                        <ul id="loss-list"></ul>
                    </div>

                    <div class="confirmation-details">
                        <div class="detail-row">
                            <span class="detail-label" data-i18n="labelPlan">現在のプラン</span>
                            <span class="detail-value" id="confirm-plan">-</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label" data-i18n="labelEndDate">アクセス終了日</span>
                            <span class="detail-value" id="confirm-end-date">-</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label" data-i18n="labelReason">キャンセル理由</span>
                            <span class="detail-value" id="confirm-reason">-</span>
                        </div>
                    </div>

                    <div class="navigation-buttons">
                        <button class="btn-secondary-action" onclick="goBack('confirm')">
                            <i class="fas fa-arrow-left"></i> <span data-i18n="btnBack">戻る</span>
                        </button>
                        <button class="btn-danger" onclick="confirmCancellation()">
                            <i class="fas fa-times-circle"></i> <span data-i18n="btnConfirmCancel">キャンセルを確定</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="assets/js/components.js"></script>
    <script src="assets/js/script.js"></script>
    <script type="module" src="assets/js/cancellation.js"></script>
</body>
</html>
